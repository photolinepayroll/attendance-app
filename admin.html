<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Admin — Photoline</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#f0f4ff;min-height:100vh;color:#1e293b}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e3a8a,#2563eb);padding:20px}
.login-card{background:#fff;border-radius:20px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo h1{font-size:28px;font-weight:900;color:#1e40af}
.login-logo p{font-size:13px;color:#64748b;margin-top:4px}
.login-label{font-size:13px;font-weight:700;color:#374151;margin-bottom:6px;display:block}
.login-input{width:100%;padding:12px 16px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15px;font-family:'Nunito',sans-serif;outline:none;transition:border .2s}
.login-input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
.login-btn{width:100%;padding:14px;margin-top:20px;background:#1e40af;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif}
.login-btn:hover{background:#2563eb}
.login-error{color:#dc2626;font-size:13px;margin-top:10px;text-align:center;display:none}
.app{display:none}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50}
.topbar-title h1{font-size:18px;font-weight:900;color:#1e40af}
.topbar-title p{font-size:12px;color:#64748b}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.logout-btn{padding:8px 16px;border-radius:8px;border:1.5px solid #e2e8f0;background:#fff;color:#64748b;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}
.refresh-btn{padding:8px 16px;border-radius:8px;border:none;background:#1e40af;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;display:flex;align-items:center;gap:6px}
.container{max-width:1200px;margin:0 auto;padding:24px 20px}
.stat-card{background:#fff;border-radius:10px;padding:10px 14px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border-left:4px solid}
@media(max-width:900px){#summaryGrid{grid-template-columns:repeat(3,1fr)!important}}
@media(max-width:500px){#summaryGrid{grid-template-columns:repeat(2,1fr)!important}}
.stat-label{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em}
.stat-value{font-size:22px;font-weight:900;color:#1e293b;margin-top:2px}
.stat-sub{font-size:10px;color:#94a3b8;margin-top:2px}
.filters{background:#fff;border-radius:14px;padding:16px 20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);display:flex;gap:12px;flex-wrap:wrap;align-items:center;border:1px solid #e2e8f0}
.filter-input{padding:9px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:'Nunito',sans-serif;outline:none;transition:border .2s;min-width:160px;background:#fff;color:#1e293b}
.filter-input:focus{border-color:#2563eb}
.filter-select{padding:9px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:'Nunito',sans-serif;outline:none;background:#fff;cursor:pointer;color:#1e293b}
.export-btn{padding:9px 18px;border-radius:8px;border:none;background:#16a34a;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;display:flex;align-items:center;gap:6px;margin-left:auto}
.table-wrap{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);border:1px solid #e2e8f0}
.table-header{padding:14px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
.table-header span{font-size:14px;font-weight:800;color:#1e293b}
.record-count{font-size:12px;color:#64748b;font-weight:600}
table{width:100%;border-collapse:collapse}
thead th{padding:12px 16px;text-align:left;font-size:11px;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:.05em;background:#f8fafc;border-bottom:1px solid #e2e8f0}
tbody tr{border-bottom:1px solid #f1f5f9;transition:background .1s}
tbody tr:hover{background:#f8fafc}
tbody tr:last-child{border-bottom:none}
td{padding:12px 16px;font-size:13px;color:#1e293b;vertical-align:middle}
.photo-thumb{width:48px;height:48px;border-radius:8px;object-fit:cover;cursor:pointer;border:2px solid #e2e8f0;transition:transform .1s}
.photo-thumb:hover{transform:scale(1.1)}
.no-photo{width:48px;height:48px;border-radius:8px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:20px}
.badge-in{display:inline-flex;align-items:center;gap:4px;background:#dcfce7;color:#16a34a;font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;white-space:nowrap}
.badge-out{display:inline-flex;align-items:center;gap:4px;background:#fee2e2;color:#dc2626;font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;white-space:nowrap}
.ts-cell{font-family:'Courier New',monospace;font-size:12px;color:#475569;white-space:nowrap}
.loading{text-align:center;padding:60px 20px;color:#64748b;font-size:14px}
.loading .spinner{width:36px;height:36px;border:3px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:#94a3b8;font-size:14px}
.empty .icon{font-size:48px;margin-bottom:12px}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;flex-direction:column;gap:16px}
.lightbox.open{display:flex}
.lightbox img{max-width:100%;max-height:80vh;border-radius:12px;object-fit:contain}
.lb-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:24px;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lb-name{color:#fff;font-size:14px;font-weight:700;margin-top:8px}
@media(max-width:768px){.table-wrap{overflow-x:auto}table{min-width:700px}.topbar{padding:12px 16px}.container{padding:16px 12px}}
</style>
</head>
<body>
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-logo">
      <h1>Photoline</h1>
      <p>Field Duty Timesheet — Admin</p>
    </div>
    <label class="login-label">Admin Password</label>
    <input type="password" class="login-input" id="passInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">🔐 Login</button>
    <div class="login-error" id="loginError">❌ Wrong password. Try again.</div>
  </div>
</div>
<div class="app" id="appWrap">
  <div class="topbar">
    <div class="topbar-title">
      <h1>Photoline Admin</h1>
      <p>Field Duty Timesheet Dashboard</p>
    </div>
    <div class="topbar-right">
      <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="container">
    <div id="empSummary" style="display:none;margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <div style="width:42px;height:42px;background:#1e40af;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff">👤</div>
        <div>
          <div id="empSummaryName" style="font-size:17px;font-weight:900;color:#1e293b"></div>
          <div style="font-size:12px;color:#64748b">Employee Summary — based on search results</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px" id="summaryGrid"></div>
    </div>
    <div class="filters">
      <input type="text" class="filter-input" id="filterName" placeholder="🔍 Search name..." oninput="applyFilters()">
      <input type="text" class="filter-input" id="filterDest" placeholder="📍 Search destination..." oninput="applyFilters()">
      <select class="filter-select" id="filterType" onchange="applyFilters()">
        <option value="">All Types</option>
        <option value="Log In">✅ Log In</option>
        <option value="Log Out">🚪 Log Out</option>
      </select>

    </div>
    <div class="filters" style="margin-top:-12px">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex:1">
        <select class="filter-select" id="dateMode" onchange="toggleDateMode()" style="min-width:140px">
          <option value="single">📅 Single Date</option>
          <option value="range">📅 Date Range</option>
        </select>
        <input type="date" class="filter-input" id="filterDate" onchange="applyFilters()">
        <span id="dateRangeSep" style="display:none;color:#94a3b8;font-size:13px;font-weight:600;padding:0 2px">→</span>
        <input type="date" class="filter-input" id="filterDateTo" onchange="applyFilters()" style="display:none">
        <button onclick="clearDates()" style="padding:9px 14px;border-radius:8px;border:none;background:#f1f5f9;color:#64748b;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif">🗑️ Clear</button>
      </div>
      <div style="display:flex;gap:8px;margin-left:auto">
        <button class="export-btn" style="margin-left:0" onclick="exportCSV()">⬇️ Export CSV</button>
        <button onclick="printPreview()" style="padding:9px 18px;border-radius:8px;border:none;background:#1e40af;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;display:flex;align-items:center;gap:6px">🖨️ Print PDF</button>
      </div>
    </div>
    <div class="table-wrap">
      <div class="table-header">
        <span>Attendance Records</span>
        <span class="record-count" id="recordCount">Loading...</span>
      </div>
      <div id="tableArea">
        <div class="loading"><div class="spinner"></div>Loading records...</div>
      </div>
    </div>
  </div>
</div>
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <img id="lbImg" alt="selfie" onclick="event.stopPropagation()">
  <div class="lb-name" id="lbName"></div>
</div>
<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz_zBYdZOXcsEE5xL2c-Q60_TDavKSGT5QhRAyjDhceziNnxgASXTGd2Y7ZbT61Hdt8oA/exec';
const ADMIN_PASS = 'Photoline.201';
let allRecords = [];
let filtered = [];
function doLogin(){
  const pass = document.getElementById('passInput').value;
  if(pass === ADMIN_PASS){
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('appWrap').style.display = 'block';
    sessionStorage.setItem('adminAuth','1');
    loadData();
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('passInput').value = '';
  }
}
function doLogout(){
  sessionStorage.removeItem('adminAuth');
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('appWrap').style.display = 'none';
  document.getElementById('passInput').value = '';
}
if(sessionStorage.getItem('adminAuth')){
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('appWrap').style.display = 'block';
  setTimeout(function(){ loadData(); }, 300);
}
var CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRZHyqa-jPGZYgystWjoXi8nG1TCvmodSqXT675cY4xpA5jpWWVw-lYSBoLSbgWS0LNHgvyXxLcgZWt/pub?output=csv';
function parseCSV(text){
  text = text.replace(/^\uFEFF/, '').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  var lines = text.split('\n');
  lines = lines.filter(function(l){ return l.replace(/,/g,'').trim().length > 0; });
  if(lines.length < 2) return [];
  function parseLine(line){
    var cols = [], cur = '', inQ = false;
    for(var i=0;i<line.length;i++){
      var c = line[i];
      if(c==='"'){
        if(inQ && line[i+1]==='"'){ cur+='"'; i++; }
        else { inQ=!inQ; }
      } else if(c===','&&!inQ){
        cols.push(cur.trim());
        cur='';
      } else {
        cur+=c;
      }
    }
    cols.push(cur.trim());
    return cols;
  }
  var headers = parseLine(lines[0]).map(function(h){ return h.replace(/^"|"$/g,'').trim(); });
  return lines.slice(1).map(function(line){
    var cols = parseLine(line);
    var obj = {};
    headers.forEach(function(h,i){ obj[h] = (cols[i]||'').replace(/^"|"$/g,'').trim(); });
    return obj;
  });
}
function loadData(){
  document.getElementById('tableArea').innerHTML = '<div class="loading"><div class="spinner"></div>Loading records...</div>';
  document.getElementById('recordCount').textContent = 'Loading...';
  fetch(CSV_URL + '&t=' + Date.now())
    .then(function(r){ return r.text(); })
    .then(function(text){
      var records = parseCSV(text);
      allRecords = records.reverse();
      applyFilters();
    })
    .catch(function(){
      document.getElementById('tableArea').innerHTML = '<div class="empty"><div class="icon">⚠️</div>Failed to load. Check connection.</div>';
    });
}
function formatTs(raw){
  if(!raw) return '—';
  var s = String(raw).trim().replace('T',' ').replace('Z','').replace(/\.\d+$/,'');
  var parts = s.match(/(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2})/);
  if(!parts) return s;
  var h=parseInt(parts[4]), mi=parts[5], ampm=h>=12?'PM':'AM';
  h=h%12||12;
  return parts[2]+'/'+parts[3]+'/'+parts[1]+' '+String(h).padStart(2,'0')+':'+mi+' '+ampm;
}
function getHour(ts){
  if(!ts) return -1;
  var s = String(ts).replace('T',' ').replace('Z','');
  var m = s.match(/(\d{2}):(\d{2}):/);
  return m ? parseInt(m[1]) + parseInt(m[2])/60 : -1;
}
function toggleDateMode(){
  var mode = document.getElementById('dateMode').value;
  document.getElementById('filterDateTo').style.display = mode==='range'?'block':'none';
  document.getElementById('dateRangeSep').style.display = mode==='range'?'inline':'none';
  if(mode!=='range') document.getElementById('filterDateTo').value = '';
  applyFilters();
}
function clearDates(){
  document.getElementById('filterDate').value = '';
  document.getElementById('filterDateTo').value = '';
  applyFilters();
}
function applyFilters(){
  const name = document.getElementById('filterName').value.toLowerCase();
  const dest = document.getElementById('filterDest').value.toLowerCase();
  const type = document.getElementById('filterType').value;
  const date = document.getElementById('filterDate').value;
  const dateTo = document.getElementById('filterDateTo').value;
  const mode = document.getElementById('dateMode').value;
  var base = allRecords.filter(r => {
    const matchName = !name || (r.Name||'').toLowerCase().includes(name);
    const matchDest = !dest || (r.Destination||'').toLowerCase().includes(dest);
    const matchType = !type || r.Type === type;
    var matchDate = true;
    if(date && r.Timestamp){
      var tsDate = String(r.Timestamp).replace('T',' ').replace('Z','').substring(0,10);
      matchDate = mode==='range' && dateTo ? (tsDate>=date && tsDate<=dateTo) : tsDate===date;
    }
    return matchName && matchDest && matchType && matchDate;
  });
  filtered = base;
  renderTable();
}
function updateSummary(){
  var name = document.getElementById('filterName').value.trim();
  if(!name || filtered.length===0){ document.getElementById('empSummary').style.display='none'; return; }
  var nameMap = {};
  filtered.forEach(function(r){ var k=(r.Name||'').toLowerCase().trim(); if(!nameMap[k]) nameMap[k]=r.Name||''; });
  var keys = Object.keys(nameMap);
  if(keys.length>1){ document.getElementById('empSummary').style.display='none'; return; }
  var recs=filtered, empName=nameMap[keys[0]]||keys[0];
  var dates=new Set(recs.map(r=>String(r.Timestamp||'').substring(0,10)));
  var locs=new Set(recs.map(r=>(r.Destination||'').trim()).filter(Boolean));
  var dayLogs=recs.filter(r=>{var h=getHour(r.Timestamp);return h>=7&&h<18;}).length;
  var eveningLogs=recs.filter(r=>{var h=getHour(r.Timestamp);return h>=18&&h<22;}).length;
  var otLogs=recs.filter(r=>{var h=getHour(r.Timestamp);return h>=22.017||(h>=0&&h<7);}).length;
  document.getElementById('empSummaryName').textContent=empName;
  var cards=[
    {label:'Total Days',value:dates.size,sub:'Unique working days',color:'#2563eb'},
    {label:'Total Records',value:recs.length,sub:'Log In + Log Out',color:'#7c3aed'},
    {label:'Locations',value:locs.size,sub:'Unique destinations',color:'#0891b2'},
    {label:'Day Logs',value:dayLogs,sub:'7:00 AM – 5:59 PM',color:'#16a34a'},
    {label:'Evening Logs',value:eveningLogs,sub:'6:00 PM – 10:00 PM',color:'#d97706'},
    {label:'Overtime Logs',value:otLogs,sub:'10:01 PM – 6:59 AM',color:'#dc2626'},
  ];
  document.getElementById('summaryGrid').innerHTML=cards.map(c=>
    `<div class="stat-card" style="border-color:${c.color}">
      <div class="stat-label">${c.label}</div>
      <div class="stat-value" style="color:${c.color}">${c.value}</div>
      <div class="stat-sub">${c.sub}</div>
    </div>`
  ).join('');
  document.getElementById('empSummary').style.display='block';
}
function renderTable(){
  document.getElementById('recordCount').textContent = filtered.length+' record'+(filtered.length!==1?'s':'');
  updateSummary();
  if(!filtered.length){
    document.getElementById('tableArea').innerHTML='<div class="empty"><div class="icon">📋</div>No records found.</div>';
    return;
  }
  const geoQueue = [];
  const rows=filtered.map((r,i)=>{
    const isIn=r.Type==='Log In';
    const badge=isIn?'<span class="badge-in">✅ Log In</span>':'<span class="badge-out">🚪 Log Out</span>';
    var thumbUrl='',fullUrl=r['Photo Link']||'';
    if(fullUrl.includes('id=')){
      var fid=fullUrl.split('id=')[1];
      thumbUrl='https://drive.google.com/thumbnail?id='+fid+'&sz=w120';
      fullUrl='https://drive.google.com/thumbnail?id='+fid+'&sz=w800';
    }
    const photo=thumbUrl
      ?`<img src="${thumbUrl}" class="photo-thumb" alt="selfie"
           onerror="this.style.display='none';this.nextSibling.style.display='flex'"
           onclick="openLightbox('${fullUrl}','${(r.Name||'').replace(/'/g,'')}')">
         <div class="no-photo" style="display:none">👤</div>`
      :'<div class="no-photo">👤</div>';
    const lat=r.Latitude||'', lng=r.Longitude||'';
    const isFakeGPS = (parseFloat(lat)===14.676041 && parseFloat(lng)===121.043700)||(parseFloat(lat)===14.628533);
    const hasGPS = !isFakeGPS && lat && lng;
    const savedAddr = r.Address&&/[a-zA-Z]/.test(r.Address) ? r.Address : null;
    const addrId = 'addr-'+i;
    const addrCell = hasGPS
      ? `<a href="https://www.openstreetmap.org/?mlat=${lat}&mlon=${lng}&zoom=17" target="_blank"
             id="${addrId}"
             style="color:#1e40af;font-size:12px;font-weight:600;text-decoration:none;display:flex;align-items:flex-start;gap:5px">
             <span>📍</span><span style="word-break:break-word">${savedAddr || '<em style=\'color:#94a3b8\'>Loading...</em>'}</span></a>`
      : `<span style="color:#94a3b8;font-size:12px;font-style:italic">GPS</span>`;
    // Queue geocode — run AFTER DOM is updated
    if(hasGPS && !savedAddr) geoQueue.push({lat:parseFloat(lat), lng:parseFloat(lng), id:addrId});
    return `<tr>
      <td><input type="checkbox" class="row-check" data-idx="${i}" style="cursor:pointer;width:16px;height:16px"></td>
      <td>${photo}</td>
      <td><strong>${r.Name||'—'}</strong></td>
      <td>${r.Destination||'—'}</td>
      <td>${badge}</td>
      <td class="ts-cell">${formatTs(r.Timestamp)}</td>
      <td>${addrCell}</td>
    </tr>`;
  }).join('');
  document.getElementById('tableArea').innerHTML=`
    <table>
      <thead><tr>
        <th style="width:36px"><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)" style="cursor:pointer;width:16px;height:16px"></th>
        <th>Photo</th><th>Name</th><th>Destination</th>
        <th>Type</th><th>Timestamp</th><th>Address / Location</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  // Now DOM is ready — fire geocode requests with stagger to avoid rate limiting
  // Nominatim allows max 1 req/sec — use 1100ms stagger
  geoQueue.forEach(function(q, idx){
    setTimeout(function(){ reverseGeocodeAdmin(q.lat, q.lng, q.id); }, idx * 1100);
  });
  document.querySelectorAll('.row-check').forEach(function(c){
    c.addEventListener('change', updateSelectionCount);
  });
}
function toggleSelectAll(cb){
  document.querySelectorAll('.row-check').forEach(function(c){ c.checked = cb.checked; });
  updateSelectionCount();
}
function updateSelectionCount(){
  var selected = document.querySelectorAll('.row-check:checked').length;
  var total = document.querySelectorAll('.row-check').length;
  var sa = document.getElementById('selectAll');
  if(sa) sa.indeterminate = selected > 0 && selected < total;
  if(sa) sa.checked = selected === total && total > 0;
}
function getSelectedRecords(){
  var checked = document.querySelectorAll('.row-check:checked');
  if(checked.length === 0) return filtered;
  var indices = [];
  checked.forEach(function(c){ indices.push(parseInt(c.getAttribute('data-idx'))); });
  return indices.map(function(i){ return filtered[i]; }).filter(Boolean);
}
function openLightbox(src,name){
  document.getElementById('lbImg').src=src;
  document.getElementById('lbName').textContent=name;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lbImg').src='';
}
var _geoCache = {};
function reverseGeocodeAdmin(lat, lng, elemId, retry){
  var key = lat.toFixed(5)+','+lng.toFixed(5);
  if(_geoCache[key]){ setAddrElem(elemId, _geoCache[key]); return; }
  var controller = new AbortController();
  var timer = setTimeout(function(){ controller.abort(); }, 6000);
  fetch('https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat='+lat+'&lon='+lng+'&zoom=17&addressdetails=1',
    {headers:{'Accept-Language':'en'}, signal: controller.signal})
    .then(function(r){ clearTimeout(timer); return r.json(); })
    .then(function(data){
      var d = data.address||{};
      var parts = [
        d.road||d.pedestrian||d.footway||d.neighbourhood,
        d.suburb||d.village||d.town||d.city_district,
        d.city||d.town||d.municipality
      ].filter(Boolean);
      var addr = parts.length ? parts.join(', ')
        : (data.display_name ? data.display_name.split(',').slice(0,3).join(',').trim() : '');
      if(addr){
        _geoCache[key] = addr;
        setAddrElem(elemId, addr);
      } else if(!retry){
        setTimeout(function(){ reverseGeocodeAdmin(lat, lng, elemId, true); }, 3000);
      } else {
        setAddrElem(elemId, 'GPS');
      }
    })
    .catch(function(){
      clearTimeout(timer);
      if(!retry){
        // Retry once after 4 seconds
        setTimeout(function(){ reverseGeocodeAdmin(lat, lng, elemId, true); }, 4000);
      } else {
        setAddrElem(elemId, 'GPS');
      }
    });
}
function setAddrElem(elemId, text){
  var el = document.getElementById(elemId);
  if(el){ var s=el.querySelector('span:last-child'); if(s) s.innerHTML=text; }
}
function splitTs(raw){
  var f=formatTs(raw);
  if(!f||f==='—') return {date:'',time:''};
  var parts=f.split(' ');
  return {date:parts[0]||'',time:(parts[1]||'')+' '+(parts[2]||'')};
}
function printPreview(){
  var toPrint = getSelectedRecords();
  var selCnt = document.querySelectorAll('.row-check:checked').length;
  if(!toPrint.length){ alert('No records to print.'); return; }
  if(selCnt > 0 && !confirm('Print ' + selCnt + ' selected record(s)?')) return;
  var records = toPrint;
  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8">';
  html += '<title>Attendance Report — Photoline</title>';
  html += '<style>';
  html += '* { box-sizing:border-box; margin:0; padding:0; }';
  html += 'body { font-family: Arial, sans-serif; background:#fff; }';
  html += '@page { size: letter landscape; margin: 0; }';
  html += '.page { width:279mm; min-height:215mm; padding:8mm; }';
  html += '.report-header { text-align:center; margin-bottom:4mm; border-bottom:1.5px solid #1e40af; padding-bottom:2mm; }';
  html += '.report-header h1 { font-size:16px; color:#1e40af; font-weight:900; letter-spacing:-0.5px; }';
  html += '.report-header p { font-size:10px; color:#64748b; margin-top:2px; }';
  html += '.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:4mm; }';
  html += '.card { border:1.5px solid #e2e8f0; border-radius:8px; overflow:hidden; break-inside:avoid; background:#fff; }';
  html += '.card-photo-wrap { position:relative; width:100%; height:65mm; background:#000; overflow:hidden; }';
  html += '.card-photo-wrap img { width:100%; height:100%; object-fit:contain; display:block; background:#000; }';
  html += '.card-no-photo { width:100%; height:58mm; background:#f1f5f9; display:flex; align-items:center; justify-content:center; font-size:36px; }';
  html += '.card-info { padding:3px 6px 4px; border-top:1px solid #f1f5f9; }';
  html += '.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:2px; }';
  html += '.card-name { font-size:10px; font-weight:700; color:#1e293b; }';
  html += '.badge-in { font-size:9px; font-weight:800; color:#16a34a; background:#dcfce7; padding:2px 7px; border-radius:10px; white-space:nowrap; }';
  html += '.badge-out { font-size:9px; font-weight:800; color:#dc2626; background:#fee2e2; padding:2px 7px; border-radius:10px; white-space:nowrap; }';
  html += '.card-dest { font-size:9px; color:#2563eb; margin-bottom:2px; }';
  html += '.card-ts { font-size:8px; color:#475569; font-family:monospace; }';
  html += '.card-addr { font-size:8px; color:#64748b; margin-top:0px; }';
  html += '.no-gps { font-size:9px; color:#f59e0b; font-weight:600; }';
  html += '@media print { body{margin:0} .page{padding:8mm} .no-print{display:none!important} .card{page-break-inside:avoid} }';
  html += '</style></head><body>';
  var now = new Date().toLocaleDateString('en-PH', {month:'long', day:'numeric', year:'numeric'});
  var filterName = document.getElementById('filterName').value || 'All Employees';
  var filterDate = document.getElementById('filterDate').value || '';
  for(var i=0; i<records.length; i+=6){
    var chunk = records.slice(i, i+6);
    html += '<div class="page"><div class="report-header">';
    html += '<h1>PHOTOLINE — Field Duty Timesheet</h1>';
    html += '<p>'+filterName+(filterDate?' | Date: '+filterDate:'')+' | Printed: '+now+' | Page '+(Math.floor(i/6)+1)+' of '+Math.ceil(records.length/6)+'</p>';
    html += '</div><div class="grid">';
    chunk.forEach(function(r){
      var thumbUrl='', photoLink=r['Photo Link']||'';
      if(photoLink.includes('id=')){
        var fid=photoLink.split('id=')[1];
        thumbUrl='https://drive.google.com/thumbnail?id='+fid+'&sz=w600';
      }
      var isIn=r.Type==='Log In';
      var badge=isIn?'<span class="badge-in">✅ Log In</span>':'<span class="badge-out">🚪 Log Out</span>';
      var lat=r.Latitude||'', lng=r.Longitude||'';
      var isFake=(parseFloat(lat)===14.676041&&parseFloat(lng)===121.043700);
      var addr=(!isFake&&r.Address&&/[a-zA-Z]/.test(r.Address))?r.Address:((!isFake&&r.Latitude&&r.Longitude)?'GPS':'GPS');
      html+='<div class="card">';
      html+=thumbUrl?'<div class="card-photo-wrap"><img src="'+thumbUrl+'" alt="selfie"></div>':'<div class="card-no-photo">👤</div>';
      html+='<div class="card-info"><div class="card-top"><span class="card-name">'+(r.Name||'—')+'</span>'+badge+'</div>';
      html+='<div class="card-dest">📍 '+(r.Destination||'—')+'</div>';
      html+='<div class="card-ts">'+formatTs(r.Timestamp)+'</div>';
      html+='<div class="card-addr">📍 '+addr+'</div></div></div>';
    });
    html+='</div></div>';
  }
  html+='<div class="no-print" style="position:fixed;top:20px;right:20px;display:flex;gap:10px">';
  html+='<button onclick="window.print()" style="background:#1e40af;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer">🖨️ Print / Save PDF</button>';
  html+='<button onclick="window.close()" style="background:#64748b;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer">✕ Close</button>';
  html+='</div></body></html>';
  var win=window.open('','_blank');
  if(win){ win.document.write(html); win.document.close(); }
}
function exportCSV(){
  var toExport = getSelectedRecords();
  var selCount = document.querySelectorAll('.row-check:checked').length;
  if(!toExport.length){alert('No records to export.');return;}
  if(selCount > 0 && !confirm('Export ' + selCount + ' selected record(s)?')) return;
  const headers=['Name','Destination','Date','Type','Time','Address','Photo Link'];
  const rows=[headers,...toExport.map(r=>{
    var ts=splitTs(r.Timestamp);
    var type=r.Type==='Log In'?'IN':r.Type==='Log Out'?'OUT':r.Type||'';
    return['"'+(r.Name||'')+'"','"'+(r.Destination||'')+'"','"'+ts.date+'"','"'+type+'"','"'+ts.time.trim()+'"','"'+(r.Address||'')+'"','"'+(r['Photo Link']||'')+'"'];
  })];
  const csv=rows.map(r=>Array.isArray(r)?r.join(','):r).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='attendance_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}
